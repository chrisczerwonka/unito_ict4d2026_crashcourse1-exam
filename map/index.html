<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHEL EDU-CONTINUITY HUB | Risk Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent-cyan: #22d3ee;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Navigation */
        nav {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .nav-brand {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-cyan);
            letter-spacing: -1px;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-cyan);
        }

        /* Map Container */
        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        /* Map UI Elements */
        .leaflet-bar { border: 1px solid var(--border) !important; box-shadow: none !important; }
        .leaflet-bar a { background: var(--bg-dark) !important; color: var(--accent-cyan) !important; border-bottom: 1px solid var(--border) !important; }
        
        .legend {
            padding: 15px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            line-height: 1.8em;
            border-radius: 8px;
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .legend b { color: var(--accent-cyan); font-family: 'JetBrains Mono', monospace; }

        .map-overlay-title {
            position: absolute;
            top: 20px;
            left: 60px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace;
            font-weight: bold;
            color: var(--accent-cyan);
            pointer-events: none;
        }

        .leaflet-popup-content-wrapper {
            background: var(--bg-dark);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        .leaflet-popup-tip { background: var(--bg-dark); }
    </style>
</head>
<body>

    <nav>
        <a href="../index.html" class="nav-brand">EDU_CONTINUITY_HUB.v1</a>
        <div class="nav-links">
            <a href="../index.html">Overview</a>
            <a href="../proposal-strategy-section/">Strategy</a>
            <a href="index.html" class="active">Risk Map</a>
            <a href="../dashboard/">Analytics</a>
        </div>
    </nav>

    <div id="map"></div>
    <div class="map-overlay-title">GEOSPATIAL_INTEL // PROXIMITY_ANALYSIS</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../data/processed/map-data.js"></script>
    <script src="../data/processed/at-risk-data.js"></script>
    <script src="../data/processed/safe-data.js"></script>

    <script>
        const map = L.map('map').setView([14.0, 1.0], 6);

        // Dark mode tile layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Conflict Events Layer
        const conflictLayer = L.layerGroup();
        eventData.forEach(event => {
            const radius = Math.sqrt(event.FATALITIES) * 3 + 4;
            L.circleMarker([event.CENTROID_LATITUDE, event.CENTROID_LONGITUDE], {
                radius: radius,
                fillColor: "#f97316",
                color: "transparent",
                fillOpacity: 0.6
            })
            .bindPopup(`
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">
                    <b style="color:#f97316">CONFLICT_EVENT</b><br>
                    DATE: ${event.WEEK}<br>
                    TYPE: ${event.EVENT_TYPE}<br>
                    FATALITIES: ${event.FATALITIES}
                </div>
            `)
            .addTo(conflictLayer);
        });

        // At-Risk Schools Layer (Cyan/Neon)
        const atRiskLayer = L.geoJSON(atRiskData, {
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                radius: 4,
                fillColor: "#22d3ee",
                color: "#fff",
                weight: 0.5,
                opacity: 1,
                fillOpacity: 0.9
            }),
            onEachFeature: (feature, layer) => {
                layer.bindPopup(`
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">
                        <b style="color:#22d3ee">AT_RISK_FACILITY</b><br>
                        NAME: ${feature.properties.name}<br>
                        PROXIMITY: ${feature.properties.distance_to_nearest_conflict} KM
                    </div>
                `);
            }
        });

        // Safe Schools Layer (Dimmed Slate)
        const safeLayer = L.geoJSON(safeData, {
            pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
                radius: 3,
                fillColor: "#475569",
                color: "#000",
                weight: 0.5,
                opacity: 0.6,
                fillOpacity: 0.5
            }),
            onEachFeature: (feature, layer) => {
                layer.bindPopup(`
                    <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">
                        <b style="color:#94a3b8">SAFE_FACILITY</b><br>
                        NAME: ${feature.properties.name}<br>
                        PROXIMITY: ${feature.properties.distance_to_nearest_conflict} KM
                    </div>
                `);
            }
        });

        conflictLayer.addTo(map);
        atRiskLayer.addTo(map);
        safeLayer.addTo(map);

        const overlayMaps = {
            "<span style='color:#f97316'>Conflict Clusters</span>": conflictLayer,
            "<span style='color:#22d3ee'>At-Risk Facilities (&lt;5km)</span>": atRiskLayer,
            "<span style='color:#475569'>Safe Facilities (&gt;5km)</span>": safeLayer
        };
        L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);

        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>LEGEND</b><br>';
            div.innerHTML += '<i style="background: #f97316; border-radius: 50%; width: 10px; height: 10px; display: inline-block;"></i> Conflict Cluster<br>';
            div.innerHTML += '<i style="background: #22d3ee; border-radius: 50%; width: 10px; height: 10px; display: inline-block;"></i> At-Risk School<br>';
            div.innerHTML += '<i style="background: #475569; border-radius: 50%; width: 10px; height: 10px; display: inline-block;"></i> Safe School';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
