<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahel Conflict Map (Fatalities)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; padding: 0; }
        .legend {
            padding: 10px;
            background: white;
            line-height: 1.5em;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="data/processed/map_data.js"></script>

    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([15.0, 1.0], 5);

        // 2. Add background tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Add conflict events
        eventData.forEach(event => {
            // Circle size based on fatalities
            // We use a small base size (3) plus a multiplier for fatalities
            const radius = Math.sqrt(event.FATALITIES) * 3 + 3;

            L.circleMarker([event.CENTROID_LATITUDE, event.CENTROID_LONGITUDE], {
                radius: radius,
                fillColor: "#e74c3c", // Red for fatalities
                color: "#c0392b",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.7
            })
            .addTo(map)
            .bindPopup(`
                <b>Date:</b> ${event.WEEK}<br>
                <b>Event Type:</b> ${event.EVENT_TYPE}<br>
                <b>Fatalities:</b> ${event.FATALITIES}
            `);
        });

        // 4. Add a simple legend
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<b>Legend</b><br>';
            div.innerHTML += '<i style="background: #e74c3c; border-radius: 50%; width: 10px; height: 10px; display: inline-block;"></i> Conflict Event<br>';
            div.innerHTML += '<small>Circle size = Number of fatalities</small>';
            return div;
        };
        legend.addTo(map);

    </script>
</body>
</html>
