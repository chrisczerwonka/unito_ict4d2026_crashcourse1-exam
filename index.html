<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahel Conflict Map</title>
    <!-- 1. Include Leaflet's CSS (the styling for the map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 2. Set the size of the map */
        #map {
            height: 100vh; /* Full screen height */
            width: 100%;
        }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <!-- 3. The div where the map will live -->
    <div id="map"></div>

    <!-- 4. Include Leaflet's JavaScript library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 5. Include our data file -->
    <script src="data/processed/map_data.js"></script>

    <script>
        // 6. Initialize the map and center it on the Sahel (approx 15N, 1E)
        const map = L.map('map').setView([15.0, 1.0], 5);

        // 7. Add the background "tiles" (the actual map image)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 8. Loop through each event in our data
        eventData.forEach(event => {
            // Calculate circle size based on population exposure
            // We use Math.sqrt to make the size look more natural
            const radius = Math.sqrt(event.POPULATION_EXPOSURE) / 10 + 2;

            // Create a circle for the event
            L.circleMarker([event.CENTROID_LATITUDE, event.CENTROID_LONGITUDE], {
                radius: radius,
                fillColor: "#ff7800",
                color: "#000",
                weight: 1,
                opacity: 1,
                fillOpacity: 0.8
            })
            .addTo(map)
            // Add the popup with details
            .bindPopup(`
                <b>Date:</b> ${event.WEEK}<br>
                <b>Type:</b> ${event.EVENT_TYPE}<br>
                <b>Subtype:</b> ${event.SUB_EVENT_TYPE}<br>
                <b>Fatalities:</b> ${event.FATALITIES}
            `);
        });
    </script>
</body>
</html>
